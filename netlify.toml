[build]\ncommand = "npm run build"\nfunctions = "netlify/functions"\npublish = ".next/static"\n\n[dev]\ncommand = "npm run dev"\nport = 3000\n\n[env]\nDATABASE_URL = "PostgreSQL database URL"\nNEXTAUTH_SECRET = "NextAuth secret key"\nNEXTAUTH_URL = "NextAuth URL (for production: https://yourdomain.netlify.app)"\nGMAIL_CLIENT_ID = "Gmail OAuth Client ID"\nGMAIL_CLIENT_SECRET = "Gmail OAuth Client Secret"\nGMAIL_REDIRECT_URI = "Gmail redirect URI (for production: https://yourdomain.netlify.app/.netlify/functions/auth/gmail/callback)"\n\n[[redirects]]\nfrom = "/*"\nto = "/index.html"\nstatus = 200\n\n[functions]\node_bundler = "esbuild"\n\n[build.environment]\nNODE_VERSION = "18"\n